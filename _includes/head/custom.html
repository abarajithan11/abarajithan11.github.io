<link rel="icon" type="image/x-icon" href="{{ site.content_base_url }}/images/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="{{ site.content_base_url }}/images/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.content_base_url }}/images/favicon/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.content_base_url }}/images/favicon/apple-touch-icon-180.png">

      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

{% if page.collection == "posts" %}
  {% assign schema_image = page.header.image | default: page.header.teaser | default: page.teaser | default: site.author.avatar %}
  {% assign schema_image_is_absolute = schema_image | slice: 0, 4 %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "@id": "{{ page.url | absolute_url }}#article",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    },
    "headline": {{ page.title | jsonify }},
    "description": {{ page.excerpt | markdownify | strip_html | strip_newlines | replace: "  ", " " | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{% if page.last_modified_at %}{{ page.last_modified_at | date_to_xmlschema }}{% else %}{{ page.date | date_to_xmlschema }}{% endif %}",
    "author": {
      "@type": "Person",
      "name": {{ site.author.name | default: site.title | jsonify }},
      "url": "{{ site.author.url | default: site.url }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }},
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.schema_logo }}"
      }
    },
    "image": [
      "{% if schema_image_is_absolute == 'http' %}{{ schema_image }}{% else %}{{ schema_image | absolute_url }}{% endif %}"
    ]{% if page.categories and page.categories.size > 0 %},
    "articleSection": {{ page.categories | jsonify }}{% endif %}{% if page.tags and page.tags.size > 0 %},
    "keywords": {{ page.tags | join: ", " | jsonify }}{% endif %}
  }
  </script>
{% endif %}

<style>
  html,
  body,
  button,
  input,
  select,
  textarea,
  .greedy-nav,
  .masthead,
  .site-title,
  .author__name,
  .archive__item-title,
  .page__title,
  .page__content,
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
  }

  .sidebar-tags__heading {
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    list-style: none;
    margin-top: 0.8rem;
    opacity: 0.72;
    padding-top: 0.8rem;
  }

  .sidebar-tags__item {
    list-style: none;
  }

  .sidebar-tags__group {
    list-style: none;
  }

  .sidebar-tags__group details {
    margin: 0;
  }

  .sidebar-tags__group summary {
    cursor: pointer;
    font-weight: 600;
    list-style: none;
    margin: 0.2rem 0;
  }

  .sidebar-tags__group summary::-webkit-details-marker {
    display: none;
  }

  .sidebar-tags__children {
    list-style: none;
    margin: 0.35rem 0 0.15rem 0.8rem;
    padding: 0;
  }

  .sidebar-tags__children .sidebar-tags__item {
    margin: 0.15rem 0;
  }

  .author__urls .sidebar-tags__item a {
    text-decoration: none;
  }

  .author__urls .sidebar-tags__item a:hover {
    text-decoration: underline;
  }

  .author__urls .fa-linkedin,
  .author__urls .fa-linkedin-in {
    color: inherit !important;
  }
</style>
<script>
  window.pageContext = {
    isPost: {{ page.collection == "posts" | jsonify }},
    commentsEnabled: {{ page.comments | default: false | jsonify }}
  };
  window.giscusConfig = {
    repo: "abarajithan11/abarajithan11.github.io",
    repoId: "R_kgDORH_xug",
    category: "Announcements",
    categoryId: "DIC_kwDORH_xus4C4vWc",
    mapping: "pathname",
    strict: "0",
    reactionsEnabled: "1",
    emitMetadata: "0",
    inputPosition: "top",
    theme: "light",
    lang: "en",
    loading: "lazy"
  };
  window.siteTagPages = [
    {% for item in site.data.tag_pages %}
      {
        title: {{ item.title | jsonify }},
        url: {{ item.url | relative_url | jsonify }},
        count: {{ item.count | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  window.siteTagHierarchy = [
    {% for item in site.data.sidebar_tag_hierarchy %}
      {
        title: {{ item.title | jsonify }},
        children: {{ item.children | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  window.sitePostCards = [
    {% for post in site.posts %}
      {% assign post_html = post.content %}
      {% assign teaser = post.teaser | default: "" %}
      {% if teaser == "" and post_html contains '<img ' %}
        {% assign image_parts = post_html | split: '<img ' %}
        {% assign first_image = image_parts[1] %}
        {% assign teaser = first_image | split: 'src="' | last | split: '"' | first %}
      {% endif %}
      {% if teaser == "" and post_html contains '![' %}
        {% assign markdown_parts = post_html | split: '![' %}
        {% if markdown_parts.size > 1 %}
          {% assign teaser = markdown_parts[1] | split: '](' | last | split: ')' | first %}
        {% endif %}
      {% endif %}
      {% assign teaser = teaser | strip | replace: '{{ site.content_base_url }}', '' | replace: site.content_base_url, '' %}
      {% if teaser contains '/content/' %}
        {% assign teaser = teaser | split: '/content' | last %}
      {% endif %}
      {% assign teaser_first_char = teaser | slice: 0, 1 %}
      {% if teaser != "" and teaser contains '://' == false and teaser_first_char != '/' %}
        {% assign teaser = '/' | append: teaser %}
      {% endif %}
      {% assign excerpt = post.excerpt | markdownify | strip_html | strip_newlines | replace: "  ", " " | strip %}
      {
        url: {{ post.url | relative_url | jsonify }},
        title: {{ post.title | jsonify }},
        date: {{ post.date | date: "%B %-d, %Y" | jsonify }},
        excerpt: {{ excerpt | jsonify }},
        teaser: {% if teaser != "" %}{% if teaser contains "://" %}{{ teaser | jsonify }}{% else %}{{ site.content_base_url | append: teaser | jsonify }}{% endif %}{% else %}""{% endif %}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>
<script defer src="{{ '/assets/js/custom.js?v=21' | relative_url }}"></script>

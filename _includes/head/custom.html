<style>
  html,
  body,
  button,
  input,
  select,
  textarea,
  .greedy-nav,
  .masthead,
  .site-title,
  .author__name,
  .archive__item-title,
  .page__title,
  .page__content,
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
  }

  .nav-dropdown {
    position: relative;
  }

  .nav-dropdown__menu {
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.12);
    box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.12);
    display: none;
    left: 0;
    list-style: none;
    margin: 0;
    min-width: 14rem;
    padding: 0.4rem 0;
    position: absolute;
    top: calc(100% + 0.35rem);
    z-index: 1000;
  }

  .nav-dropdown.is-open .nav-dropdown__menu {
    display: block;
  }

  .nav-dropdown__menu a {
    color: inherit;
    display: block;
    padding: 0.45rem 0.9rem;
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-dropdown__menu a:hover {
    background: rgba(0, 0, 0, 0.05);
    text-decoration: none;
  }
</style>
<script>
  window.siteTagPages = [
    {% for item in site.data.tag_pages %}
      { title: {{ item.title | jsonify }}, url: {{ item.url | relative_url | jsonify }} }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>
<script defer src="{{ '/assets/js/custom.js?v=8' | relative_url }}"></script>

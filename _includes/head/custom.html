<style>
  html,
  body,
  button,
  input,
  select,
  textarea,
  .greedy-nav,
  .masthead,
  .site-title,
  .author__name,
  .archive__item-title,
  .page__title,
  .page__content,
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
  }

  .sidebar-tags {
    margin-top: 1rem;
  }

  .sidebar-tags__title {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 0.45rem;
  }

  .sidebar-tags__list {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .sidebar-tags__list a {
    text-decoration: none;
  }

  .sidebar-tags__list a:hover {
    text-decoration: underline;
  }
</style>
<script>
  window.siteTagPages = [
    {% for item in site.data.tag_pages %}
      {
        title: {{ item.title | jsonify }},
        url: {{ item.url | relative_url | jsonify }},
        count: {{ item.count | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>
<script defer src="{{ '/assets/js/custom.js?v=10' | relative_url }}"></script>

# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: G Abarajithan
url: "https://abapages.com"
baseurl: ""
email: agnaneswaran<at>gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  PhD student @ UC San Diego. Hardware Security & Verification, Custom Hardware for Edge AI and SoC-level Integration
# twitter_username: username
github_username: abarajithan11
minimal_mistakes_skin: "contrast"
search: true
content_base_url: "https://media.abapages.com/content"
schema_logo: "https://media.abapages.com/content/images/favicon/apple-touch-icon-180.png"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "G Abarajithan"
  url    : "https://abapages.com/"
  avatar : "https://media.abapages.com/content/images/bio-photo.jpg"
  bio    : "PhD student @ UC San Diego. Hardware Security & Verification, Custom Hardware for Edge AI and SoC-level Integration"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/abarajithan11"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/abarajithan11/"
    - label: "Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=7T40DhoAAAAJ"
    - label: "Contact Me"
      icon: "fas fa-fw fa-envelope"
      url: "/#contact-me"
    - label: "All posts"
      icon: "fas fa-fw fa-newspaper"
      url: "/posts/"

footer:
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://abapages.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/abarajithan11"
    - label: "Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=7T40DhoAAAAJ"
    - label: "All posts"
      icon: "fas fa-fw fa-newspaper"
      url: "/posts/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      author_profile: true
      classes: wide

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

